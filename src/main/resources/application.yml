spring:
  application:
    name: spring-boot-outbox-pattern
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/outbox_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: OutboxHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          batch_versioned_data: true
          order_inserts: true
          order_updates: true
        query:
          in_clause_parameter_padding: true
        generate_statistics: false
    show-sql: false
    open-in-view: false
  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 10
      compression-type: lz4
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:outbox-consumer-group}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest
      max-poll-records: 100
  # Spring AI Configuration — Ollama (lokal, ücretsiz)
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        enabled: true
        options:
          model: ${OLLAMA_CHAT_MODEL:deepseek-r1:7b}
          temperature: 0.7
          num-predict: 2000
      embedding:
        enabled: true
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

# Custom Kafka properties (referenced directly in @KafkaListener and @Value)
kafka:
  topics:
    transactions: ${KAFKA_TOPIC_TRANSACTIONS:springboot.transactions}
    payments: ${KAFKA_TOPIC_PAYMENTS:springboot.payments}
    embargo: ${KAFKA_TOPIC_EMBARGO:springboot.embargo}
  consumer:
    group-id: ${KAFKA_CONSUMER_GROUP:outbox-consumer-group}

# Outbox Configuration
outbox:
  scheduler:
    enabled: true
    pending:
      fixed-delay: 5000
      initial-delay: 10000
    retry:
      fixed-delay: 60000
      initial-delay: 30000
    stuck:
      fixed-delay: 600000
      initial-delay: 60000
      threshold-minutes: 30
  cleanup:
    enabled: true
    cron: "0 0 2 * * ?"
    retention-days: 7
    batch-size: 1000
    dead-letter:
      cron: "0 0 3 * * ?"

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      kafkaPublisher:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 2s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.lang.Exception
  retry:
    instances:
      kafkaPublisher:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - org.springframework.kafka.KafkaException
          - java.util.concurrent.TimeoutException
  timelimiter:
    instances:
      kafkaPublisher:
        timeout-duration: 30s
        cancel-running-future: true

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,flyway,scheduledtasks,threaddump,heapdump
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# Logging Configuration
logging:
  level:
    root: INFO
    com.springboot.outbox: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    io.github.resilience4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
  file:
    name: logs/outbox-pattern.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 1GB

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  http2:
    enabled: true
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 200
      min-spare: 10
    max-connections: 10000
    accept-count: 100
    connection-timeout: 20000

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    show-actuator: true
