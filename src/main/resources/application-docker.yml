spring:
  application:
    name: spring-boot-outbox-pattern
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      acks: all
      retries: 3
    consumer:
      group-id: outbox-consumer-group
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
  # Flyway Docker Configuration
  flyway:
    enabled: true

# Outbox Docker Configuration
outbox:
  scheduler:
    enabled: true

logging:
  level:
    root: INFO
    com.springboot.outbox: DEBUG
  file:
    name: /app/logs/application.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

zipkin:
  tracing:
    endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
