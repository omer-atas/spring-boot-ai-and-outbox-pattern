spring:
  # Development Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/outbox_db
    username: postgres
    password: postgres
  # JPA Configuration for Development
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  # Kafka Development Configuration
  kafka:
    bootstrap-servers: localhost:9092
  # Flyway Development Configuration
  flyway:
    enabled: true

# Outbox Development Configuration
outbox:
  scheduler:
    enabled: true
    pending:
      fixed-delay: 10000
  cleanup:
    retention-days: 1

# Logging Development Configuration
logging:
  level:
    root: INFO
    com.springboot.outbox: DEBUG
    org.springframework.kafka: DEBUG
    org.hibernate.SQL: DEBUG
