spring:
  flyway:
    enabled: false
datasource:
url: jdbc:h2:mem:testdb
driver-class-name: org.h2.Driver
username: sa
password:
jpa:
hibernate:
ddl-auto: create-drop
show-sql: true
kafka:
bootstrap-servers: ${spring.embedded.kafka.brokers}
consumer:
auto-offset-reset: earliest
enable-auto-commit: false
producer:
acks: all
outbox:
scheduler:
enabled: true
pending:
fixed-delay: 5000
retry:
fixed-delay: 30000
logging:
level:
root: INFO
com.springboot.outbox: DEBUG
org.springframework.kafka: WARN
